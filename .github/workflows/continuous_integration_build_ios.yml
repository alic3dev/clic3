name: continuous_integration_build_ios
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version: 18.5
jobs:
  continuous_integration_build_ios:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - uses: actions/checkout@v5
      - name: make:clic3_ios
        run: make clic3_ios_without_metal target_device_version=${{ env.target_device_version }} target_device=iphone
