name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version_ios: 18.5
  target_device_version_macos: 15.5
  target_metal_standard: metal3.2
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - uses: actions/checkout@v4
      - name: make:clic3
        run: make target_device_version=${{ env.target_device_version_macos }} disable_metal_fast_options=1 target_metal_standard=${{ env.target_metal_standard }}
      - name: make:clic3_ios
        run: make target_device_version=${{ env.target_device_version_ios }} target_device=iphone disable_metal_fast_options=1 target_metal_standard=${{ env.target_metal_standard }}
      - name: make:unit_tests
        run: make unit_tests target_device_version=${{ env.target_device_version_macos }}
      - name: run:unit_tests
        run: make unit_tests_run target_device_version=${{ env.target_device_version_macos }}
