name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version: 15.5
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - uses: actions/checkout@v5
      - name: make:clic3
        run: make clic3_without_metal target_device_version=${{ env.target_device_version }}
      - name: make:unit_tests
        run: make unit_tests target_device_version=${{ env.target_device_version }}
      - name: run:unit_tests
        run: make unit_tests_run target_device_version=${{ env.target_device_version }}
